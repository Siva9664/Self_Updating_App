
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Updating App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-section {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .status-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .status-display {
            font-size: 16px;
            color: #333;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .module-list {
            list-style: none;
            padding: 0;
            margin-top: 12px;
        }

        .module-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-item:last-child {
            border-bottom: none;
        }

        .module-name {
            font-weight: 500;
            color: #333;
        }

        .module-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .module-status.success {
            background: #d4edda;
            color: #155724;
        }

        .module-status.failed {
            background: #f8d7da;
            color: #721c24;
        }

        .collapsible-trigger {
            cursor: pointer;
            color: #667eea;
            text-decoration: underline;
            font-size: 12px;
            margin-top: 10px;
            display: inline-block;
            transition: color 0.2s ease;
        }

        .collapsible-trigger:hover {
            color: #764ba2;
        }

        .settings-panel {
            background: #f0f7ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #667eea;
            display: none;
        }

        .settings-panel.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 10px;
            background: white;
            border-radius: 6px;
        }

        .settings-item:last-child {
            margin-bottom: 0;
        }

        .settings-label {
            font-size: 13px;
            color: #333;
            font-weight: 500;
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: #ccc;
            border-radius: 13px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #667eea;
        }

        .toggle-switch .slider {
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 6px;
            top: 1px;
            left: 1px;
            transition: left 0.3s;
        }

        .toggle-switch.active .slider {
            left: 24px;
        }

        .settings-icon {
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.3s;
            position: absolute;
            top: 0;
            right: 0;
        }

        .settings-icon:hover {
            transform: rotate(20deg);
        }

        .auto-update-badge {
            display: inline-block;
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-content {
            display: none;
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
            color: #333;
            line-height: 1.6;
            border: 1px solid #e0e0e0;
        }

        .status-content pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 10px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-check {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-check:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-update {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-update:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-message {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        .success-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            display: none;
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            button {
                padding: 12px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="icon">🚀</span>
            <h1>Self-Updating App</h1>
            <p>Keep Your App Fresh</p>
            <span class="settings-icon" onclick="toggleSettings()" title="Settings">⚙️</span>
        </div>

        <div class="error-message" id="errorMessage">
            <span>⚠️</span>
            <span id="errorText"></span>
        </div>

        <div class="success-message" id="successMessage">
            <span>✓</span>
            <span id="successText"></span>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-item">
                <span class="settings-label">🔄 Auto-Update</span>
                <div class="toggle-switch" id="autoUpdateToggle" onclick="toggleAutoUpdate()">
                    <div class="slider"></div>
                </div>
            </div>
            <div class="settings-item">
                <span class="settings-label">⏱️ Check Interval (minutes)</span>
                <input type="number" id="checkInterval" min="1" max="60" style="width: 50px; padding: 6px; border: 1px solid #ddd; border-radius: 4px;" />
            </div>
            <div class="settings-item">
                <span class="settings-label">📦 Auto-Install Updates</span>
                <div class="toggle-switch" id="autoInstallToggle" onclick="toggleAutoInstall()">
                    <div class="slider"></div>
                </div>
            </div>
            <div class="settings-item">
                <span class="settings-label">🔔 Show Notifications</span>
                <div class="toggle-switch" id="notificationToggle" onclick="toggleNotifications()">
                    <div class="slider"></div>
                </div>
            </div>
            <button onclick="saveSettings()" style="width: 100%; margin-top: 10px; padding: 8px;" class="btn-check">Save Settings</button>
        </div>

        <div class="status-section">
            <div class="status-label">💾 Update Status 
                <span class="auto-update-badge" id="autoUpdateBadge" style="display: none;">AUTO ✓</span>
            </div>
            <div class="status-display" id="statusDisplay">Ready to check for updates</div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill"></div>
            </div>
            <div id="versionBadge"></div>
            <div id="modulesContainer" style="display: none; margin-top: 15px;">
                <strong>📦 Available Modules:</strong>
                <ul class="module-list" id="modulesList"></ul>
            </div>
            <span class="collapsible-trigger" id="detailsTrigger" style="display: none;">Show Details</span>
            <div class="status-content" id="statusContent"></div>
        </div>

        <div class="button-group">
            <button class="btn-check" id="checkBtn" onclick="checkUpdates()">
                <span id="checkIcon">🔍</span>
                <span id="checkText">Check Updates</span>
            </button>
            <button class="btn-update" id="updateBtn" onclick="instantAutoInstall()" title="Updates install automatically when found">
                <span id="updateIcon">⚡</span>
                <span id="updateText">Auto-Install</span>
            </button>
        </div>
    </div>

    <script>
        let hasUpdates = false;
        let lastCheckData = null;
        let autoUpdateSettings = {
            enabled: true,
            checkIntervalMinutes: 5,
            autoInstall: true,
            showNotification: true
        };
        let autoCheckInterval = null;
        let lastAutoCheckTime = 0;

        // Load settings on page load
        function loadSettings() {
            fetch('/settings')
                .then(res => res.json())
                .then(data => {
                    const settings = data.auto_update;
                    autoUpdateSettings = {
                        enabled: settings.enabled,
                        checkIntervalMinutes: settings.check_interval_minutes,
                        autoInstall: settings.auto_install,
                        showNotification: settings.show_notification
                    };
                    updateSettingsUI();
                    if (autoUpdateSettings.enabled) {
                        startAutoUpdate();
                    }
                })
                .catch(err => console.error('Failed to load settings:', err));
        }

        function updateSettingsUI() {
            document.getElementById('autoUpdateToggle').classList.toggle('active', autoUpdateSettings.enabled);
            document.getElementById('autoInstallToggle').classList.toggle('active', autoUpdateSettings.autoInstall);
            document.getElementById('notificationToggle').classList.toggle('active', autoUpdateSettings.showNotification);
            document.getElementById('checkInterval').value = autoUpdateSettings.checkIntervalMinutes;
            document.getElementById('autoUpdateBadge').style.display = autoUpdateSettings.enabled ? 'inline-block' : 'none';
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('show');
            if (panel.classList.contains('show')) {
                updateSettingsUI();
            }
        }

        function toggleAutoUpdate() {
            autoUpdateSettings.enabled = !autoUpdateSettings.enabled;
            document.getElementById('autoUpdateToggle').classList.toggle('active');
            if (autoUpdateSettings.enabled) {
                startAutoUpdate();
                showSuccess('Auto-update enabled');
            } else {
                stopAutoUpdate();
                showSuccess('Auto-update disabled');
            }
        }

        function toggleAutoInstall() {
            autoUpdateSettings.autoInstall = !autoUpdateSettings.autoInstall;
            document.getElementById('autoInstallToggle').classList.toggle('active');
        }

        function toggleNotifications() {
            autoUpdateSettings.showNotification = !autoUpdateSettings.showNotification;
            document.getElementById('notificationToggle').classList.toggle('active');
        }

        function saveSettings() {
            const settings = {
                auto_update: {
                    enabled: autoUpdateSettings.enabled,
                    check_interval_minutes: parseInt(document.getElementById('checkInterval').value) || 5,
                    auto_install: autoUpdateSettings.autoInstall,
                    show_notification: autoUpdateSettings.showNotification
                }
            };

            fetch('/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings)
            })
            .then(res => res.json())
            .then(data => {
                autoUpdateSettings.checkIntervalMinutes = settings.auto_update.check_interval_minutes;
                showSuccess('Settings saved successfully');
                toggleSettings();
                if (autoUpdateSettings.enabled) {
                    stopAutoUpdate();
                    startAutoUpdate();
                }
            })
            .catch(err => showError('Failed to save settings'));
        }

        function startAutoUpdate() {
            if (autoCheckInterval) return;
            
            console.log(`Auto-update started. Checking every ${autoUpdateSettings.checkIntervalMinutes} minutes`);
            
            // Check immediately
            autoCheckForUpdates();
            
            // Then check periodically
            autoCheckInterval = setInterval(autoCheckForUpdates, autoUpdateSettings.checkIntervalMinutes * 60 * 1000);
        }

        function stopAutoUpdate() {
            if (autoCheckInterval) {
                clearInterval(autoCheckInterval);
                autoCheckInterval = null;
                console.log('Auto-update stopped');
            }
        }

        function autoCheckForUpdates() {
            const now = Date.now();
            if (now - lastAutoCheckTime < 1000) return; // Prevent rapid repeated checks
            lastAutoCheckTime = now;

            console.log('Auto-update check running...');
            fetch('/check')
                .then(res => res.json())
                .then(data => {
                    if (data.updates_available) {
                        console.log('Updates available:', data.available_modules);
                        if (autoUpdateSettings.showNotification) {
                            showSuccess(`📦 Updates found! Installing: ${data.available_modules.join(', ')}`);
                        }
                        
                        // Always install updates instantly when found
                        console.log('Auto-installing updates instantly...');
                        setTimeout(() => {
                            instantAutoInstall();
                        }, 500);
                        
                        displayStatus(data);
                    } else {
                        // No updates, just display status
                        displayStatus(data);
                        loadCurrentVersion();
                    }
                })
                .catch(err => console.log('Auto-check failed:', err.message));
        }

        function autoInstallUpdates() {
            console.log('Starting auto-install...');
            const statusEl = document.getElementById('statusDisplay');
            const progressBar = document.getElementById('progressBar');
            
            progressBar.classList.add('active');
            statusEl.innerHTML = '<span class="spinner"></span> Auto-installing updates...';
            
            fetch('/update')
                .then(res => res.json())
                .then(data => {
                    displayUpdateResult(data);
                    loadCurrentVersion();
                    if (data.success && autoUpdateSettings.showNotification) {
                        showSuccess('✅ Updates installed automatically!');
                    }
                })
                .catch(error => {
                    console.error('Auto-install failed:', error);
                    progressBar.classList.remove('active');
                    statusEl.textContent = 'Auto-update failed (will retry)';
                });
        }

        function setLoading(btn, loading) {
            btn.disabled = loading;
            if (loading) {
                btn.querySelector('span:first-child').innerHTML = '<div class="spinner"></div>';
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            document.getElementById('successText').textContent = message;
            successEl.classList.add('show');
            setTimeout(() => successEl.classList.remove('show'), 4000);
        }

        function formatJson(data) {
            return JSON.stringify(data, null, 2);
        }

        function displayStatus(data) {
            lastCheckData = data;
            const statusEl = document.getElementById('statusDisplay');
            const contentEl = document.getElementById('statusContent');
            const progressBar = document.getElementById('progressBar');
            const versionBadge = document.getElementById('versionBadge');
            const modulesContainer = document.getElementById('modulesContainer');
            const modulesList = document.getElementById('modulesList');
            const detailsTrigger = document.getElementById('detailsTrigger');

            if (data.error) {
                statusEl.innerHTML = '❌ ' + data.error;
                hasUpdates = false;
                document.getElementById('updateBtn').disabled = true;
                versionBadge.innerHTML = '';
                return;
            }

            if (data.updates_available) {
                statusEl.innerHTML = '📦 Updates found! Installing instantly...';
                hasUpdates = true;
                
                // Display available modules
                if (data.available_modules && data.available_modules.length > 0) {
                    modulesList.innerHTML = data.available_modules
                        .map(m => `<li class="module-item"><span class="module-name">${m}</span></li>`)
                        .join('');
                    modulesContainer.style.display = 'block';
                }
                
                // Trigger instant auto-install
                setTimeout(() => {
                    instantAutoInstall();
                }, 500);
                
                return;
            } else {
                statusEl.innerHTML = '✨ App is up to date';
                hasUpdates = false;
                document.getElementById('updateBtn').disabled = true;
            }

            // Display available modules
            if (data.available_modules && data.available_modules.length > 0) {
                modulesList.innerHTML = data.available_modules
                    .map(m => `<li class="module-item"><span class="module-name">${m}</span></li>`)
                    .join('');
                modulesContainer.style.display = 'block';
            } else {
                modulesContainer.style.display = 'none';
            }

            // Display version badge
            if (data.current_version) {
                versionBadge.innerHTML = `<div class="version-badge">v${data.current_version}</div>`;
            }

            // Show details trigger
            detailsTrigger.style.display = 'inline-block';
            detailsTrigger.onclick = () => {
                contentEl.classList.toggle('active');
                detailsTrigger.textContent = contentEl.classList.contains('active') ? 'Hide Details' : 'Show Details';
            };

            // Prepare details content
            contentEl.innerHTML = '<pre>' + formatJson(data) + '</pre>';
            progressBar.classList.remove('active');
        }

        function instantAutoInstall() {
            console.log('Instant auto-install triggered...');
            const statusEl = document.getElementById('statusDisplay');
            const progressBar = document.getElementById('progressBar');
            
            progressBar.classList.add('active');
            statusEl.innerHTML = '<span class="spinner"></span> Installing updates instantly...';
            
            fetch('/update')
                .then(res => res.json())
                .then(data => {
                    displayUpdateResult(data);
                    loadCurrentVersion();
                    if (data.success) {
                        showSuccess('✅ Updates installed instantly!');
                    } else {
                        showError('Installation completed with errors');
                    }
                })
                .catch(error => {
                    console.error('Instant install failed:', error);
                    progressBar.classList.remove('active');
                    statusEl.textContent = 'Installation failed (will retry)';
                    showError('Update failed: ' + error.message);
                });
        }

        function loadCurrentVersion() {
            fetch('/version')
                .then(res => res.json())
                .then(data => {
                    const versionBadge = document.getElementById('versionBadge');
                    if (data.current_version) {
                        versionBadge.innerHTML = `<div class="version-badge">v${data.current_version}</div>`;
                    }
                })
                .catch(err => console.log('Failed to load version:', err));
        }

        function displayUpdateResult(data) {
            const contentEl = document.getElementById('statusContent');
            const statusEl = document.getElementById('statusDisplay');
            const progressBar = document.getElementById('progressBar');
            const detailsTrigger = document.getElementById('detailsTrigger');

            progressBar.classList.remove('active');

            if (data.success) {
                statusEl.innerHTML = '✅ Update Complete!';
                showSuccess('Update installed successfully!');
            } else {
                statusEl.innerHTML = '⚠️ Update Completed with Errors';
                showError('Some modules failed to update. See details below.');
            }

            // Build detailed update result display
            let html = '<strong>Update Summary:</strong><br><br>';

            if (data.modules && data.modules.length > 0) {
                html += '<strong>Modules:</strong><br>';
                data.modules.forEach(mod => {
                    const statusBadge = mod.status === 'success' ? 
                        `<span class="module-status success">SUCCESS</span>` :
                        `<span class="module-status failed">FAILED</span>`;
                    html += `<div class="module-item">
                        <span class="module-name">${mod.name}</span>
                        ${statusBadge}
                    </div>`;
                });
            }

            html += `<br><strong>Status:</strong> ${data.status}`;
            if (data.timestamp) {
                html += `<br><strong>Timestamp:</strong> ${data.timestamp}`;
            }

            contentEl.innerHTML = html;
            contentEl.classList.add('active');
            detailsTrigger.textContent = 'Hide Details';
            detailsTrigger.onclick = () => {
                contentEl.classList.toggle('active');
                detailsTrigger.textContent = contentEl.classList.contains('active') ? 'Hide Details' : 'Show Details';
            };

            hasUpdates = false;
            document.getElementById('updateBtn').disabled = true;
        }

        function checkUpdates() {
            const checkBtn = document.getElementById('checkBtn');
            const progressBar = document.getElementById('progressBar');
            const originalIcon = checkBtn.querySelector('span:first-child');
            
            setLoading(checkBtn, true);
            progressBar.classList.add('active');
            document.getElementById('statusDisplay').innerHTML = '<span class="spinner"></span> Checking for updates...';
            
            fetch('/check')
                .then(res => res.json())
                .then(data => {
                    loadCurrentVersion();
                    
                    if (data.updates_available) {
                        console.log('Updates available:', data.available_modules);
                        showSuccess(`📦 Updates found! Installing instantly...`);
                        displayStatus(data);
                        // Updates will auto-install via displayStatus trigger
                    } else if (!data.error) {
                        displayStatus(data);
                        showSuccess('✨ Your app is already up to date');
                    } else {
                        displayStatus(data);
                    }
                })
                .catch(error => {
                    showError('Failed to check updates: ' + error.message);
                    document.getElementById('statusDisplay').textContent = 'Error checking updates';
                })
                .finally(() => {
                    setLoading(checkBtn, false);
                    originalIcon.innerHTML = '🔍';
                });
        }

        function installUpdates() {
            const updateBtn = document.getElementById('updateBtn');
            const progressBar = document.getElementById('progressBar');
            const originalIcon = updateBtn.querySelector('span:first-child');
            
            setLoading(updateBtn, true);
            progressBar.classList.add('active');
            document.getElementById('statusDisplay').innerHTML = '<span class="spinner"></span> Installing updates...';
            
            fetch('/update')
                .then(res => res.json())
                .then(data => {
                    displayUpdateResult(data);
                    loadCurrentVersion();
                })
                .catch(error => {
                    progressBar.classList.remove('active');
                    showError('Update failed: ' + error.message);
                    document.getElementById('statusDisplay').textContent = 'Error installing updates';
                })
                .finally(() => {
                    setLoading(updateBtn, false);
                    originalIcon.innerHTML = '⬇️';
                });
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            document.getElementById('statusDisplay').textContent = 'Ready to check for updates';
            loadCurrentVersion();
            loadSettings();
        });
    </script>
</body>
</html>
