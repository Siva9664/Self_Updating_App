name: Deploy App
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Increment version
        id: get_version
        run: |
          python -c "
          import json
          try:
              with open('version.json', 'r') as f:
                  versions = json.load(f)
          except Exception:
              versions = {'app': '1.0.0'}
          current = versions.get('app', '1.0.0')
          major, minor, patch = map(int, current.split('.'))
          patch += 1
          new_version = f'{major}.{minor}.{patch}'
          versions['app'] = new_version
          with open('version.json', 'w') as f:
              json.dump(versions, f, indent=2)
          print(f'version={new_version}')
          with open('version.env', 'w') as f:
              f.write(new_version)
          "
          $NEW_VERSION = Get-Content version.env
          echo "version=$NEW_VERSION" >> $env:GITHUB_OUTPUT
        shell: pwsh
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build exe
        run: pyinstaller --onefile --windowed --name=SelfUpdatingApp --clean --noconfirm app.py
        
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/SelfUpdatingApp.exe
            version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
